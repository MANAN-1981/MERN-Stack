<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex box</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <div class="items">1</div>
      <div class="items">2</div>
      <div class="items">3</div>
      <div class="items">4</div>
    </div>
  <style>
  body {
      height: 100vh;
      width: 100vw;
  }
  
  #container {
      width: 70vw;
      height: 40vh;
      margin: 100px auto;
      background-color: rgb(164, 230, 230);
      border-radius: 1rem;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      
  }
  
  .items {
      width: 100px;
      height: 100px;
      background-color: aqua;
      border-radius: 1rem;
      margin: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
  }
  </style>
  </body>
</html>
