A lightweight tag in Git is essentially a simple pointer to a specific commit, without storing extra metadata like the tagger’s name, date, or message. It’s useful for quick, internal markers rather than public releases.

Steps to Create a Lightweight Tag

Navigate to your repository

cd /path/to/your/repo
Copy
Create the lightweight tag Simply run:

git tag <tagname>

Tag a specific commit If you want to tag an older commit:

git tag <tagname> <commit-hash>

Verify the tag List all tags:

git tag

Pushing Lightweight Tags to Remote

By default, tags are not pushed with git push. You must explicitly push them:

Push a single tag:

git push origin <tagname>
Copy
Push all tags:

git push origin --tags
Copy
Deleting Lightweight Tags

Delete locally:

git tag -d <tagname> -->
