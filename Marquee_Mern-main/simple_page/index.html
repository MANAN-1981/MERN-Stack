<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technologies Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            padding: 20px;
            justify-content: center;
            align-items: center; 
        }
        .dashboard-container{
            display: flex;
            width: 100%;
            max-width: 1200px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .tech-grid{
            size: auto;
            justify-content: center;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
                      
        }

        .header-icon {
            background-color: #005691;
            color: #ffffff;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0, 86, 145, 0.2);
        }

        .header-title-container {
            display: flex;
            flex-direction: column;
        }
        
        .content-header h1 {
            color: #0a3663;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.1;
        }

        .header-underline {
            width: 45px;
            height: 4px;
            background-color: #005691;
            margin-top: 6px;
            border-radius: 2px;
        }
         .icon-wrapper {
            width: 65px;
            height: 65px;
            background-color: #f7fafc;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .icon-wrapper img {
            width: 100%;
            height: 100%;
        }

        .tech-card span {
            color: #2d3748;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
         .tech-card {
            background: #ffffff;
            border: 1px solid #edf2f7;
            border-radius: 16px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .sidebar{
            width: 220px;
            background-color: #00426e;
            color: #ffffff;
            padding: 20px;
        }
        .sidebar-menu{
            list-style: none;
            margin-top: 20px;
            size: auto;
        }
       .menu-item i{
        color: #f0f2f5;
        }
        .menu-item {
            color: orangered;
            margin: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="sidebar-title">Technologies</div>
            <ul class="sidebar-menu">
                <li>
                    <a href="#" class="menu-item active">
                        <i class="fa-solid fa-desktop"></i>
                        Frontend
                    </a>
                </li>
                <li>
                    <a href="#" class="menu-item">
                        <i class="fa-solid fa-server"></i>
                        Backend
                    </a>
                </li>
                <li>
                    <a href="#" class="menu-item">
                        <i class="fa-solid fa-mobile-screen-button"></i>
                        Mobile
                    </a>
                </li>
                <li>
                    <a href="#" class="menu-item">
                        <i class="fa-solid fa-layer-group"></i>
                        Platforms
                    </a>
                </li>
                <li>
                    <a href="#" class="menu-item">
                        <i class="fa-solid fa-database"></i>
                        Databases
                    </a>
                </li>
            </ul>
        </aside>

        <main class="content-area">
            <div class="content-header">
                <div class="header-icon">
                    <i class="fa-solid fa-desktop"></i>
                </div>
                <div class="header-title-container">
                    <h1>Frontend</h1>
                    <div class="header-underline"></div>
                </div>
            </div>

            
            <div class="tech-grid">
                
                
                <div class="tech-card">
                    <div class="icon-wrapper">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/angularjs/angularjs-original.svg" alt="AngularJS">
                    </div>
                    <span>AngularJS</span>
                </div>

                <div class="tech-card">
                    <div class="icon-wrapper">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg" alt="ReactJS">
                    </div>
                    <span>ReactJS</span>
                </div>

                
                <div class="tech-card">
                    <div class="icon-wrapper">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vuejs/vuejs-original.svg" alt="Vue.js">
                    </div>
                    <span>Vue.js</span>
                </div>

                <div class="tech-card">
                    <div class="icon-wrapper">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript">
                    </div>
                    <span>JavaScript</span>
                </div>

                
                <div class="tech-card">
                    <div class="icon-wrapper">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg" alt="CSS3">
                    </div>
                    <span>CSS3</span>
                </div>

                
                <div class="tech-card">
                    <div class="icon-wrapper">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML5">
                    </div>
                    <span>HTML5</span>
                </div>


                <div class="tech-card">
                    <div class="icon-wrapper">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg" alt="Next.js" style="filter: brightness(0);">
                    </div>
                    <span>Next.js</span>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
